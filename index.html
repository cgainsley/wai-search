<!DOCTYPE html>
<html>
<head>
  <title>WAI Help Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Calibri, Arial, sans-serif;
      background: #f5f7fc;
      color: #051c40;
      margin: 0;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 16px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      background: #051c40;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .chips span {
      display: inline-block;
      background: #eef1f6;
      padding: 8px 12px;
      border-radius: 6px;
      margin: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e3e6ed;
      border-radius: 6px;
      padding: 16px;
      margin-top: 20px;
    }

    .result-item {
      margin-bottom: 14px;
    }

    .result-item a {
      color: #2a6ebb;
      font-weight: 500;
      text-decoration: none;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 16px;
      background: #108687;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>WAI Help Center</h1>
  <div class="sub">What can we help you with today?</div>

  <!-- SEARCH -->
  <form onsubmit="runSearch(event)">
    <input id="searchInput" placeholder="Ask a question like: How do I renew my membership">
    <button type="submit">Search</button>
  </form>

  <!-- QUICK BUTTONS -->
  <div class="chips">
    <span onclick="quickSearch('renew membership')">Renew membership</span>
    <span onclick="quickSearch('scholarships')">Scholarships</span>
    <span onclick="quickSearch('conference')">Conference</span>
    <span onclick="quickSearch('find a chapter')">Find a chapter</span>
    <span onclick="quickSearch('login help')">Login help</span>
  </div>

  <!-- RESULTS -->
  <div id="result"></div>

</div>

<script>

// SEARCH
function runSearch(e){
  e.preventDefault();
  const q = document.getElementById("searchInput").value;
  if(!q) return;
  window.location.href = "?q=" + encodeURIComponent(q);
}

// QUICK BUTTONS
function quickSearch(text){
  window.location.href = "?q=" + encodeURIComponent(text);
}

// BUILD GOOGLE-STYLE RESULTS
function buildTopResults(q){

  const query = q.toLowerCase();
  let results = [];

  if(query.includes("member")){
    results = [
      ["Membership Information","https://www.wai.org/membership-information","Join, renew, or manage your membership."],
      ["Member Compass","https://www.wai.org/member-compass","Access your account or reset your password."],
      ["Member Benefits","https://www.wai.org/membership-information","Explore all membership benefits."]
    ];
  }

  else if(query.includes("scholar")){
    results = [
      ["WAI Scholarships","https://www.wai.org/scholarships","Browse and apply for scholarships."],
      ["Scholarship FAQ","https://www.wai.org/scholarships","Learn how to apply and eligibility."]
    ];
  }

  else if(query.includes("conference") || query.includes("event")){
    results = [
      ["Annual Conference","https://www.wai.org/conference","Details and registration."],
      ["Events Calendar","https://www.wai.org/events","Explore upcoming events."]
    ];
  }

  else if(query.includes("chapter")){
    results = [
      ["Find a Chapter","https://www.wai.org/chapters","Browse chapters by region."],
      ["Community Programs","https://www.wai.org/community","Connect with members."]
    ];
  }

  else {
    results = [
      ["Membership","https://www.wai.org/membership-information","Join or manage your membership."],
      ["Scholarships","https://www.wai.org/scholarships","Explore funding opportunities."],
      ["Conference","https://www.wai.org/conference","Learn about the annual event."]
    ];
  }

  let html = `<div class="card"><strong>Top Results</strong><br><br>`;

  results.slice(0,5).forEach(r=>{
    html += `
      <div class="result-item">
        <a href="${r[1]}" target="_blank">${r[0]}</a>
        <div class="small">${r[2]}</div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

// LOAD RESULTS
function loadResults(q){

  let content = `<p><strong>You asked:</strong> ${q}</p>`;

  content += buildTopResults(q);

  content += `
    <a class="btn" href="https://www.google.com/search?q=site:wai.org+${encodeURIComponent(q)}" target="_blank">
      See more results
    </a>
  `;

  document.getElementById("result").innerHTML = content;
}

// LOAD FROM URL
const params = new URLSearchParams(window.location.search);
const urlQuery = params.get("q");

if(urlQuery){
  document.getElementById("searchInput").value = urlQuery;
  loadResults(urlQuery);
}

</script>

</body>
</html>
