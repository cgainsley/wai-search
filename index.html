<!-- SEARCH -->
<div style="margin: 24px auto; max-width: 600px;">
  <p><strong>Ask a question</strong></p>

  <form onsubmit="goSearch(event)">
    <input 
      type="text" 
      id="helpSearch" 
      placeholder="Ask something like: How do I renew my membership?" 
      style="width: 100%; padding: 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px;">
  </form>

  <p style="font-size: 12px; color: #666; margin-top: 6px;">
    Results will open in a new tab.
  </p>
</div>

<script>
function goSearch(e) {
  e.preventDefault();

  var query = document.getElementById("helpSearch").value;

  // WINDOW 1 → Curated results page
  window.open(
    "https://wai-search-gamma.vercel.app/?q=" + encodeURIComponent(query),
    "_blank"
  );

  // WINDOW 2 → Styled Google results (your custom page)
  window.open(
    "https://wai-search-gamma.vercel.app/google.html?q=" + encodeURIComponent(query),
    "googleWindow",
    "width=900,height=700,left=200,top=100,resizable=yes,scrollbars=yes"
  );
}
</script>
