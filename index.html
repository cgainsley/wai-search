<!DOCTYPE html>
<html>
<head>
  <title>WAI Help Center</title>

  <style>
    body {
      font-family: Calibri, Arial, sans-serif;
      background: #f5f7fc;
      color: #051c40;
      margin: 0;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .search-box {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      background: #051c40;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .chips span {
      display: inline-block;
      background: #eef1f6;
      padding: 8px 12px;
      border-radius: 6px;
      margin: 5px;
      font-size: 14px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e3e6ed;
      border-radius: 6px;
      padding: 16px;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 16px;
      background: #108687;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }

    .small {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>WAI Help Center</h1>

  <div class="sub">What can we help you with today?</div>

  <!-- SEARCH -->
  <div class="search-box">
    <form onsubmit="goSearch(event)">
      <input id="q" placeholder="Ask a question like: How do I renew my membership or find a chapter">
      <button>Search</button>
    </form>
  </div>

  <!-- SUGGESTIONS -->
  <div class="chips">
    <span>Renew membership</span>
    <span>Scholarships</span>
    <span>Conference</span>
    <span>Find a chapter</span>
    <span>Login help</span>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<script>
function goSearch(e){
  e.preventDefault();
  var query = document.getElementById("q").value;
  window.location.href = "?q=" + encodeURIComponent(query);
}

const params = new URLSearchParams(window.location.search);
const q = params.get("q");

if(q){

  let content = "<p><strong>You asked:</strong> " + q + "</p>";

  if(q.toLowerCase().includes("password") || q.toLowerCase().includes("login")){
    content += `
      <div class="card">
        <strong>Account access:</strong><br><br>
        <a href="https://www.wai.org/member-compass">Login or Reset Password</a>
      </div>
    `;
  }

  else if(q.toLowerCase().includes("member")){
    content += `
      <div class="card">
        <strong>Membership help:</strong><br><br>
        <a href="https://www.wai.org/membership-information">Join or manage membership</a>
      </div>
    `;
  }

  else {
    content += `
      <div class="card">
        <strong>Helpful links:</strong><br><br>
        <a href="https://www.wai.org/membership-information">Membership</a><br><br>
        <a href="https://www.wai.org/scholarships">Scholarships</a>
      </div>
    `;
  }

  content += `
    <p class="small">Opening more results in a new tab...</p>
    <a class="btn" href="https://www.google.com/search?q=site:wai.org+${encodeURIComponent(q)}" target="_blank">Open results</a>
  `;

  document.getElementById("result").innerHTML = content;
}
</script>

</body>
</html>
